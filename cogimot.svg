    <rect x="0" y="180" width="80" height="80" rx="8" fill="#c73e3e"/>
    <rect x="90" y="180" width="80" height="80" rx="8" fill="#538d4e"/>
    <rect x="180" y="180" width="80" height="80" rx="8" fill="#538d4e"/>
    <rect x="270" y="180" width="80" height="80" rx="8" fill="#538d4e"/>
    <rect x="360" y="180" width="80" height="80" rx="8" fill="#c73e3e"/>

    <rect x="0" y="270" width="80" height="80" rx="8" fill="#c73e3e"/>
