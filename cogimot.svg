<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="32" fill="#121213"/>

  <!-- 5×5 Wordle grid -->
  <g transform="translate(31, 46)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#538d4e"/>
    <rect x="90" y="0" width="80" height="80" rx="8" fill="#b59f3b"/>
    <rect x="180" y="0" width="80" height="80" rx="8" fill="#c73e3e"/>
    <rect x="270" y="0" width="80" height="80" rx="8" fill="#c73e3e"/>
    <rect x="360" y="0" width="80" height="80" rx="8" fill="#538d4e"/>

    <rect x="0" y="90" width="80" height="80" rx="8" fill="#b59f3b"/>
    <rect x="90" y="90" width="80" height="80" rx="8" fill="#538d4e"/>
    <rect x="180" y="90" width="80" height="80" rx="8" fill="#538d4e"/>
    <rect x="270" y="90" width="80" height="80" rx="8" fill="#c73e3e"/>
